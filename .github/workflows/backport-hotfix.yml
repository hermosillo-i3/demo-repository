name: Deploy and Backport

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  deploy-qas:
    name: Deploy to QAS
    runs-on: ubuntu-latest
    environment: qas
    
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      - name: Get tag info
        id: tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Deploying tag: $TAG_NAME"
      
      - name: Deploy to QAS server
        run: |
          echo "🚀 Deploying ${{ steps.tag.outputs.tag_name }} to QAS..."
          echo "QAS Server: qas.example.com"
          echo "Tag: ${{ steps.tag.outputs.tag_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "✅ QAS deployment completed successfully!"

  deploy-prd:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-qas
    environment: prd
    
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      - name: Get tag info
        id: tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Deploying tag: $TAG_NAME"
      
      - name: Deploy to Production server
        run: |
          echo "🚀 Deploying ${{ steps.tag.outputs.tag_name }} to PRODUCTION..."
          echo "PRD Server: production.example.com"
          echo "Tag: ${{ steps.tag.outputs.tag_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "✅ Production deployment completed successfully!"

  backport-to-develop:
    name: Backport to Develop
    runs-on: ubuntu-latest
    needs: deploy-prd
    if: endsWith(github.ref_name, '.0')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Get tag commit
        id: tag_commit
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          COMMIT_SHA=$(git rev-list -n 1 $TAG_NAME)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "🔄 Hotfix detectado (tag termina en .0), haciendo backport..."
      
      - name: Cherry-pick commit to develop
        run: |
          echo "Cherry-picking commit ${{ steps.tag_commit.outputs.commit_sha }}"
          git cherry-pick ${{ steps.tag_commit.outputs.commit_sha }}
      
      - name: Push to develop
        run: |
          git push origin develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify success
        if: success()
        run: |
          echo "✅ Successfully backported ${{ steps.tag_commit.outputs.tag_name }} to develop"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Cherry-pick failed. Manual resolution required."
          echo "Resolve conflicts locally and push to develop manually."
          exit 1
