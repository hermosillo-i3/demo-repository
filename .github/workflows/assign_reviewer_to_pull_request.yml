name: Assign a reviewer for the PR and post it on slack

on:
   pull_request:
     branches: [main, develop]
     types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  list-all-open-reviews:
    runs-on: ubuntu-latest
    outputs:
      total-open-reviews: ${{ steps.count-reviews.outputs.total-open-reviews }}
    steps:
      - name: List all open pull request reviews in organization
        id: count-reviews
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "📋 Obteniendo resumen de reviews completados y pendientes..."
          
          # Obtener la fecha de hoy en formato ISO (UTC) como punto de partida
          today_date=$(date -u +"%Y-%m-%d")
          echo "📅 Punto de partida: $today_date"
          echo "📅 Analizando TODOS los reviews completados (sin límite de tiempo)"
          
          # Contar total de PRs abiertos en toda la organización
          total_prs=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=org:${{ github.repository_owner }}+type:pr+state:open" | \
            jq '.total_count // 0')
          
          echo "============================================"
          echo "📊 RESUMEN DE REVIEWS (EQUILIBRIO DE CARGA)"
          echo "============================================"
          echo "🔢 Total de PRs abiertos en la organización: $total_prs"
          echo ""
          echo "👥 ANÁLISIS DE CARGA DE TRABAJO:"
          echo "--------------------------------"
          
          # Obtener usuarios de la configuración
          user_map='${{ vars.REVIEWERS }}'
          if [ -n "$user_map" ]; then
            github_users=($(echo $user_map | jq -r 'keys[]'))
            
            for github_user in "${github_users[@]}"; do
              # Contar reviews pendientes (PRs abiertos donde está asignado)
              pending_reviews=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/search/issues?q=org:${{ github.repository_owner }}+type:pr+state:open+review-requested:$github_user" | \
                jq '.total_count // 0')
              
              # Contar TODOS los reviews completados (PRs cerrados donde participó)
              completed_total=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/search/issues?q=org:${{ github.repository_owner }}+type:pr+state:closed+involves:$github_user" | \
                jq '.total_count // 0')
              
              echo "   👤 $github_user:"
              echo "      📋 Reviews pendientes: $pending_reviews"
              echo "      ✅ PRs cerrados (total histórico): $completed_total"
              echo ""
            done
          else
            echo "   ⚠️  No se encontró configuración de REVIEWERS"
          fi
          
          echo "============================================"
          echo "💡 ESTRATEGIA: Asignar al revisor con MENOS actividad histórica total"
          echo "   (equilibrio justo basado en TODA la contribución pasada)"
          echo "============================================"
          
          echo "total-open-reviews=$total_prs" >> "$GITHUB_OUTPUT"

  setup:
    runs-on: ubuntu-latest
    needs: [list-all-open-reviews]
    outputs:
      github-reviewer: ${{ steps.select-user.outputs.github-reviewer }}
      slack-reviewer: ${{ steps.select-user.outputs.slack-reviewer }}
      random-emoji: ${{ steps.select-emoji.outputs.random-emoji }}
      pr-author-slack: ${{ steps.select-author.outputs.pr-author-slack }}

    steps:
      - name: Load reviewers and select the one with least activity today (balanced workload)
        id: select-user
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
            # Load the JSON data from the GitHub Actions variable or secret
            user_map='${{ vars.REVIEWERS }}'
  
            # Get the GitHub actor (author of the PR)
            pr_author="${{ github.actor }}"

            # Parse JSON and filter out the PR author
            filtered_users=$(echo $user_map | jq 'del(."'"$pr_author"'")')

            # Check if there are any users left after filtering
            if [ "$(echo $filtered_users | jq '. | length')" -eq 0 ]; then
               echo "No other users available for selection."
               exit 1
            fi

            # Get all GitHub usernames (keys) from the filtered map
            github_users=($(echo $filtered_users | jq -r 'keys[]'))
            
            # Get today's date for reference
            today_date=$(date -u +"%Y-%m-%d")
            
            # Initialize variables to track the user with minimum total activity
            min_activity=""
            selected_github_user=""
            selected_slack_user=""
            first_user=true
            
            echo "🔄 Equilibrando carga: Seleccionando revisor con MENOS actividad histórica total"
            echo "📅 Analizando TODA la actividad histórica (sin límite de tiempo)"
            echo "=================================================================="
            
            # For each potential reviewer, calculate their total historical activity
            for github_user in "${github_users[@]}"; do
              echo "Analizando actividad histórica de: $github_user"
              
              # Count ALL completed reviews (PRs closed where user participated)
              completed_total=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/search/issues?q=org:${{ github.repository_owner }}+type:pr+state:closed+involves:$github_user" | \
                jq '.total_count // 0')
              
              # Count ALL reviews/comments made
              reviews_total=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
                "https://api.github.com/search/issues?q=org:${{ github.repository_owner }}+type:pr+commenter:$github_user" | \
                jq '.total_count // 0')
              
              # Calculate total historical activity
              total_activity=$((completed_total + reviews_total))
              
              echo "  📊 $github_user: $total_activity actividades (total histórico)"
              echo "      ✅ PRs cerrados: $completed_total"
              echo "      💬 Reviews/comentarios: $reviews_total"
              
              # Select user with minimum total activity (to balance workload fairly)
              if [ "$first_user" = true ] || [ "$total_activity" -lt "$min_activity" ]; then
                min_activity=$total_activity
                selected_github_user=$github_user
                selected_slack_user=$(echo $filtered_users | jq -r '."'$github_user'"')
                first_user=false
              fi
            done
            
            echo "=================================================================="
            echo "✅ Revisor seleccionado: $selected_github_user (Slack: $selected_slack_user)"
            echo "   📊 Actividad histórica total: $min_activity (la más baja del equipo)"
            echo "   💡 Estrategia: Equilibrio justo basado en TODA la contribución pasada"
            echo "=================================================================="
            
            echo "github-reviewer=$selected_github_user" >> "$GITHUB_OUTPUT"
            echo "slack-reviewer=$selected_slack_user" >> "$GITHUB_OUTPUT"

      - name: Select a random emoji
        id: select-emoji
        run: |
          # Select a random emoji from vars.SLACK_EMOJIS
          IFS=' ' read -r -a emojis <<< "${{ vars.SLACK_EMOJIS }}"
          random_emoji=${emojis[$((RANDOM % ${#emojis[@]}))]}
          echo "random-emoji=$random_emoji" >> "$GITHUB_OUTPUT"
      
      - name: Get PR author
        id: select-author
        run: |
          # Load the JSON data from the GitHub Actions variable or secret
          user_map='${{ vars.AUTHORS }}'
  
          # Get the GitHub actor (author of the PR)
          pr_author="${{ github.actor }}"

          # Extract the PR author's Slack ID from the JSON
          pr_author_slack=$(echo $user_map | jq -r '."'${pr_author}'"')
          echo "pr-author-slack=$pr_author_slack" >> "$GITHUB_OUTPUT"

  assign-reviewer:
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Assign reviewer to PR
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWER: ${{ needs.setup.outputs.github-reviewer }}
        run: |
          echo "Asignando reviewer: $REVIEWER al PR #$PR_NUMBER"
          
          # Verificar que tenemos los datos necesarios
          if [ -z "$REVIEWER" ]; then
            echo "❌ Error: No se pudo seleccionar un reviewer"
            exit 1
          fi
            
            # Fallback con curl mejorado
            response=$(curl -s -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers" \
              -d "{\"reviewers\":[\"$REVIEWER\"]}")
              
            http_code="${response: -3}"
            response_body="${response%???}"
            
            if [ "$http_code" -eq 201 ]; then
              echo "✅ Reviewer asignado exitosamente via API"
            else
              echo "❌ Error HTTP $http_code al asignar reviewer:"
              echo "$response_body"
              exit 1
            fi
          
          echo "✅ Reviewer $REVIEWER asignado exitosamente al PR #$PR_NUMBER"

  post-on-slack:
    runs-on: ubuntu-latest
    if: always()
    needs: [list-all-open-reviews, setup, assign-reviewer]
    steps:
      - name: Post to a Slack channel
        if: always()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: '${{ vars.SLACK_PULL_REQUEST_CHANNEL_ID }}'
          payload: |
            {
               "blocks": [
                  {
                     "type": "context",
                     "elements": [
                        {
                           "type": "image",
                           "image_url": "https://avatars.githubusercontent.com/u/${{github.actor_id}}?s=400&u=b81e946713a585cd4895227203a3d2ba5d5b3b46&v=4",
                           "alt_text": "actor"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{github.actor}}|${{github.actor}}>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow # ${{ github.run_id }}>"
                     }
                  },
                  {
                     "type": "section",
                     "fields": [
                        {
                           "type": "mrkdwn",
                           "text": "*Repo*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "*Pull request*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<${{ github.event.pull_request.html_url }}| Ver PR>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "fields": [
                        {
                           "type": "mrkdwn",
                           "text": "*Target Branch*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "*PR Author*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{ github.repository }}/tree/${{ github.event.pull_request.head.ref }}|${{ github.event.pull_request.head.ref }}>"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<@${{ needs.setup.outputs.pr-author-slack }}>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "<@${{ needs.setup.outputs.slack-reviewer }}> Por favor, revisa este pull request :${{ needs.setup.outputs.random-emoji }}:"
                     }
                  },
                  {
                     "type": "divider"
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "⚖️ *Equilibrio de carga:* Asignado al revisor con menos actividad histórica total"
                     }
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "📊 *Estado de la organización:* ${{ needs.list-all-open-reviews.outputs.total-open-reviews }} PRs abiertos en total"
                     }
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "🔍 *Ver análisis completo:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Logs del workflow>"
                     }
                  }
               ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}