name: CI/CD

on:
   pull_request:
     branches: [main, develop]
     types: [opened, synchronize] 

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.start.outputs.timestamp }}
      selected-user: ${{ steps.select-user.outputs.selected_user }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set start timestamp
        id: start
        run: |
          printf 'timestamp=%(%s)T\n' >> "$GITHUB_OUTPUT"

      - name: Select the user with the fewest PR assignments
        id: select-user
        run: |
          IFS=' ' read -r -a slack_users <<< "${{ vars.SLACK_USER_IDS }}"
          IFS=' ' read -r -a github_users <<< "${{ vars.GH_USERS }}"
          
          pr_assignments=$(cat pr_assignments.json)
          
          declare -A assignment_counts
          while IFS="=" read -r key value; do
            assignment_counts[$key]=$value
          done < <(echo "$pr_assignments" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"')
          
          declare -A filtered_users
          for i in "${!github_users[@]}"; do
            if [[ "${github_users[i]}" != "${{ github.actor }}" ]]; then
              slack_user_id="${slack_users[i]}"
              pr_count=${assignment_counts[$slack_user_id]:-0}
              filtered_users[$slack_user_id]=$pr_count
            fi
          done
          
          sorted_users=($(for key in "${!filtered_users[@]}"; do echo "$key:${filtered_users[$key]}"; done | sort -t':' -k2,2n | cut -d':' -f1))
          
          selected_user="${sorted_users[0]}"
          
          current_count=${assignment_counts[$selected_user]:-0}
          assignment_counts[$selected_user]=$((current_count + 1))
          
          json_data=$(jq -n --argjson counts "{}" '
            . as $empty |
            $counts | to_entries |
            reduce .[] as $item ($empty; . + {($item.key): ($item.value | tonumber)})
          ')
          
          jq -n --argjson data "$json_data" '$data' > pr_assignments.json

          echo "selected_user=$selected_user" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr_assignments.json
          git commit -m "Update PR assignments"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  post-on-slack:
    runs-on: ubuntu-latest
    if: always()
    needs: [setup]
    steps:
      - name: Post to a Slack channel
        if: always()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: '${{ vars.SLACK_CHANNEL_ID }}'
          payload: |
            {
               "blocks": [
                  {
                     "type": "context",
                     "elements": [
                        {
                           "type": "image",
                           "image_url": "https://avatars.githubusercontent.com/u/${{github.actor_id}}?s=400&u=b81e946713a585cd4895227203a3d2ba5d5b3b46&v=4",
                           "alt_text": "actor"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{github.actor}}|${{github.actor}}>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow # ${{ github.run_id }}>"
                     }
                  },
                  {
                     "type": "section",
                     "fields": [
                        {
                           "type": "mrkdwn",
                           "text": "*Repo*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "*Pull request*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<${{ github.event.pull_request.html_url }}| Ver PR>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "<@${{ needs.setup.outputs.selected-user }}> Por favor, revisa este pull request :${{ vars.PLEASE_EMOJI }}:"
                     }
                  },
                  {
                     "type": "section",
                     "fields": [
                        {
                           "type": "mrkdwn",
                           "text": "*Número de PRs revisados:*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "${{ needs.setup.outputs.selected-user }}: ${assignment_counts[$selected_user]}"
                        }
                     ]
                  },
                  {
                     "type": "divider"
                  }
               ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ vars.SLACK_BOT_TOKEN }}
