name: CI/CD

on:
   pull_request:
     branches: [main, develop]
     types: [opened, synchronize]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.start.outputs.timestamp }}
      random-user: ${{ steps.select-user.outputs.random_user }}
    steps:
      - name: Set start timestamp
        id: start
        run: |
          printf 'timestamp=%(%s)T\n' >> "$GITHUB_OUTPUT"
      
      - name: Select a random user
        id: select-user
        run: |
          echo "Filtering out the GitHub actor..."
          
          # Convert space-separated strings into arrays
          IFS=' ' read -r -a slack_users <<< "${{ vars.SLACK_USER_IDS }}"
          IFS=' ' read -r -a github_users <<< "${{ vars.GH_USERS }}"
          
          # Initialize an array to hold filtered Slack users
          filtered_slack_users=()
          
          # Loop through the GitHub users array
          for i in "${!github_users[@]}"; do
            if [[ "${github_users[i]}" != "${{ github.actor }}" ]]; then
              filtered_slack_users+=("${slack_users[i]}")
            fi
          done
          
          # Randomly select a Slack user from the filtered array
          if [ ${#filtered_slack_users[@]} -gt 0 ]; then
            random_user=${filtered_slack_users[$((RANDOM % ${#filtered_slack_users[@]}))]}
            echo "random_user=$random_user" >> "$GITHUB_OUTPUT"
          else
            echo "No other users available for selection."
          fi

  post-on-slack:
    runs-on: ubuntu-latest
    if: always()
    needs: [setup]
    steps:
      - name: Post to a Slack channel
        if: always()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: '${{ vars.SLACK_CHANNEL_ID }}'
          payload: |
            {
               "blocks": [
                  {
                     "type": "context",
                     "elements": [
                        {
                           "type": "image",
                           "image_url": "https://avatars.githubusercontent.com/u/${{github.actor_id}}?s=400&u=b81e946713a585cd4895227203a3d2ba5d5b3b46&v=4",
                           "alt_text": "actor"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{github.actor}}|${{github.actor}}>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow # ${{ github.run_id }}>"
                     }
                  },
                  {
                     "type": "section",
                     "fields": [
                        {
                           "type": "mrkdwn",
                           "text": "*Repo*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "*Pull request*"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                        },
                        {
                           "type": "mrkdwn",
                           "text": "<${{ github.event.pull_request.html_url }}| Ver PR>"
                        }
                     ]
                  },
                  {
                     "type": "section",
                     "text": {
                        "type": "mrkdwn",
                        "text": "<@${{ needs.setup.outputs.random-user }}> Por favor, revisa este pull request :${{ vars.PLEASE_EMOJI }}:"
                     }
                  },
                  {
                     "type": "divider"
                  }
               ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ vars.SLACK_BOT_TOKEN }}
